[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]  # line length handled by formatter

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
markers = [
    "integration: hits real external services (OpenRouter, EDGAR, yfinance, Tavily, Notion, Telegram)",
    "eval: opt-in RAG quality evaluation. Tier 2 (LLM-as-judge) costs ~$0.12/run, Tier 3 (RAGAS) costs ~$1+/run. Run via `pytest -m eval`.",
]
asyncio_mode = "auto"
testpaths = ["tests"]
