[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]  # line length handled by formatter

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
markers = [
    "integration: hits real external services (OpenRouter, EDGAR, yfinance, Tavily, Notion, Telegram)",
]
asyncio_mode = "auto"
testpaths = ["tests"]
